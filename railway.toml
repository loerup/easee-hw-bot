[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python app.py"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume so the SQLite checkout database survives redeployments.
# In Railway UI: add a volume mounted at /data
# Environment variable DB_PATH is set automatically to /data/cadbot.db
